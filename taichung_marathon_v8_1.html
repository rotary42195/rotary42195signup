<style>
/* ── 全域 CSS 變數 ── */

*{box-sizing:border-box;margin:0;padding:0}
.app{font-family:var(--font-sans);min-height:600px}
.header{background:#1a3a2a;color:#fff;padding:.875rem 1rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.header-left{display:flex;align-items:center;gap:10px}

.toggle{position:relative;width:36px;height:20px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.slider{position:absolute;inset:0;background:#ccc;border-radius:20px;cursor:pointer;transition:.2s}
.slider:before{content:'';position:absolute;width:14px;height:14px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s}
.toggle input:checked+.slider{background:#4caf76}
.toggle input:checked+.slider:before{transform:translateX(16px)}
.toggle-label{font-size:12px;color:var(--color-text-secondary)}

/* ── Firebase 狀態提示 ── */
.db-banner{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:8px;font-size:12px;margin-bottom:1rem}

<div class="app">
  <div class="header">

      <div class="logo">🏃</div>

        <h1>台中馬拉松社

        <p>活動報名系統</p>
      </div>

    <h2 id="rm-name"></h2><p class="msub" id="rm-date"></p>

    <div class="frow">
      <div class="fg"><label>身份</label><select class="fs" id="rg-type"><option>社友</option><option>寶眷</option><option>訪客</option></select></div>
      <div class="fg"><label>備註（選填）</label><input class="fi" id="rg-note" placeholder=""/></div>
    </div>
    <div class="mactions">
      <button class="btn-sec" onclick="closeModal('reg-modal')">取消</button>
      <button class="btn-prim" id="btn-submit-reg" onclick="submitReg()">確認報名</button>
    </div>
  </div>
</div>

<!-- 取消報名 Modal -->
<div class="overlay" id="cancel-modal">
  <div class="modal">
    <h2 id="cm-name"></h2><p class="msub" id="cm-date"></p>
    <div class="fg">
      <label>請輸入您的姓名以取消報名</label>
      <input class="fi" id="cm-input" placeholder="姓名"/>
      <div class="hint">請確認姓名與報名時相同</div>
    </div>
    <div class="mactions">
      <button class="btn-sec" onclick="closeModal('cancel-modal')">返回</button>
      <button class="btn-danger" id="btn-submit-cancel" onclick="submitCancel()">確認取消報名</button>
    </div>
  </div>
</div>

<!-- 名單 Modal -->
<div class="overlay" id="list-modal">
  <div class="modal" style="width:390px">
    <h2 id="lm-title">報名名單</h2><p class="msub" id="lm-sub"></p>
    <ul class="rlist" id="rlist-ul"></ul>
    <div style="display:flex;gap:8px">
      <button class="btn-sec" style="flex:1" onclick="closeModal('list-modal')">關閉</button>
      <button class="btn-prim" onclick="exportCSV()">匯出 CSV</button>
      <button class="btn-prim" onclick="exportPDF()" style="background:#185FA5">匯出 PDF</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

// ── 狀態 ──
let adminUnlocked = false;
let regTargetId = null, cancelTargetId = null, listTargetId = null;
let db = null;
let activitiesCache = null; // 本地快取（即時監聽更新）
let isFirebaseReady = false;
let currentView = 'front';

// ── 檢查 Firebase 設定是否已填入 ──
function isConfigured() {
  return FIREBASE_CONFIG.apiKey && !FIREBASE_CONFIG.apiKey.includes('請填入');
}

// ── 初始化 Firebase ──
function initFirebase() {
  if (!isConfigured()) {
    showDbStatus('setup');
    renderFront();
    return;
  }
  try {
    const app = initializeApp(FIREBASE_CONFIG);
    db = getDatabase(app);
    showDbStatus('loading');

    // 即時監聽資料變化
    const activitiesRef = ref(db, 'activities');
    onValue(activitiesRef, (snapshot) => {
      if (snapshot.exists()) {
        activitiesCache = snapshot.val();
      } else {
        // 第一次使用，寫入預設資料
        set(activitiesRef, DEFAULT_DATA);
        activitiesCache = JSON.parse(JSON.stringify(DEFAULT_DATA));
      }
      isFirebaseReady = true;
      showDbStatus('ok');
      // 有資料更新時，重新 render 目前頁面
      if (currentView === 'front') renderFront();
      else if (currentView === 'admin' && adminUnlocked) renderAdminTable();
    }, (error) => {
      console.error('Firebase 連線錯誤:', error);
      showDbStatus('err', error.message);
      // 降級使用 localStorage
      activitiesCache = loadLocalData();
      isFirebaseReady = false;
      renderFront();
    });

  } catch(e) {
    console.error('Firebase 初始化失敗:', e);
    showDbStatus('err', e.message);
    activitiesCache = loadLocalData();
    renderFront();
  }
}

// ── 狀態列顯示 ──
function showDbStatus(status, msg) {
  const badge = document.getElementById('sync-badge');
  // 前台不顯示 banner，只顯示 header badge
  if (status === 'ok') {
    badge.style.display = 'inline-flex';
  }
}

// ── LocalStorage 降級方案 ──
function loadLocalData() {
  try {
    const r = localStorage.getItem('tcm_activities_v5');
    return r ? JSON.parse(r) : JSON.parse(JSON.stringify(DEFAULT_DATA));
  } catch(e) { return JSON.parse(JSON.stringify(DEFAULT_DATA)); }
}
function saveLocalData(a) {
  try { localStorage.setItem('tcm_activities_v5', JSON.stringify(a)); } catch(e) {}
}

// ── 資料讀取（同步，使用快取）──
function getActivities() {
  return activitiesCache ? activitiesCache : loadLocalData();
}

// ── 資料寫入（Firebase 或 localStorage）──
async function saveActivities(acts) {
  activitiesCache = acts; // 立即更新快取
  if (isFirebaseReady && db) {
    try {
      await set(ref(db, 'activities'), acts);
    } catch(e) {
      console.error('Firebase 寫入失敗:', e);
      saveLocalData(acts);
      showToast('⚠️ 雲端同步失敗，已儲存本機');
    }
  } else {
    saveLocalData(acts);
  }
}

// ── 工具函式 ──
function nextId(a) { return a.length ? Math.max(...a.map(x=>x.id))+1 : 1; }
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}
function formatDate(d) {
  const dt = new Date(d+'T00:00:00');
  return `${dt.getMonth()+1}月${dt.getDate()}日（${['日','一','二','三','四','五','六'][dt.getDay()]}）`;
}
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function setLoading(btnId, loading) {
  const btn = document.getElementById(btnId);
  if(btn) btn.disabled = loading;
}

// ── 切換頁面 ──
window.switchView = function(v) {
  currentView = v;
  document.querySelectorAll('.view').forEach(e=>e.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(e=>e.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  document.querySelectorAll('.nav-tab')[v==='front'?0:1].classList.add('active');
  v==='front' ? renderFront() : renderAdmin();
};
window.closeModal = closeModal;

// ════════════════════════════════════════════════════════
//  前台渲染
// ════════════════════════════════════════════════════════
function renderFront() {
  const el = document.getElementById('view-front');
  if (!activitiesCache && !isFirebaseReady) {
    el.innerHTML = renderDbBanner() + '<div class="empty">⏳ 載入中…</div>';
    return;
  }
  const acts = getActivities().filter(a=>a.visible!==false).sort((a,b)=>a.date.localeCompare(b.date));
  if (!acts.length) { el.innerHTML = '<div class="empty">目前尚無開放報名活動</div>'; return; }
  el.innerHTML = `<p class="sec-title">目前開放報名活動</p><div class="activity-grid">${acts.map(a=>{
    const tag=TAGS[a.type]||TAGS.other,cnt=a.registrants.length,full=a.max&&cnt>=a.max,pct=a.max?Math.min(100,Math.round(cnt/a.max*100)):0;
    const names=a.registrants.map(r=>`<span class="nbadge">${r.name}</span>`).join('');
    return`<div class="card ctype-${a.type}">
      <div class="card-head">
        <span class="atag ${tag.cls}">${tag.label}</span>
        <div class="card-title">${a.name}</div>
        <div class="card-sub">${formatDate(a.date)}${a.desc?' · '+a.desc:''}</div>
        ${(a.location||a.mapUrl)?`<div class="card-location">${a.location?`<span>📍 ${a.location}</span>`:''}${a.mapUrl?`<a href="${a.mapUrl}" target="_blank" rel="noopener">Google 地圖</a>`:''}</div>`:''}
      </div>
      <div class="card-body">
        <div class="prog-row">
          <span class="prog-label">${a.max?`名額 ${cnt} / ${a.max}`:`已報名 ${cnt} 人`}</span>
          ${full?'<span style="font-size:11px;color:var(--color-text-danger)">已額滿</span>':''}
        </div>
        ${a.max?`<div class="prog-bar"><div class="prog-fill${full?' full':''}" style="width:${pct}%"></div></div>`:''}
        <div class="names-row">${names}</div>
        <div class="card-btns">
          <button class="reg-btn${full?' full-btn':''}" ${full?'disabled':''} onclick="${full?'':'openRegModal('+a.id+')'}">${full?'報名已額滿':'+ 我要報名'}</button>
          <button class="cancel-btn" onclick="openCancelModal(${a.id})">取消報名</button>
        </div>
      </div>
    </div>`;
  }).join('')}</div>`;
}

function renderDbBanner(type='setup', msg='') {
  if (type==='setup') return `<div class="db-banner setup"><span class="db-dot setup"></span><span>尚未設定 Firebase，請在後台管理完成設定後，所有使用者才能共享資料。目前使用本機儲存。</span></div>`;
  if (type==='err')   return `<div class="db-banner err"><span class="db-dot err"></span><span>Firebase 連線失敗（${msg}），目前使用本機儲存。</span></div>`;
  return '';
}

// ════════════════════════════════════════════════════════
//  報名 / 取消
// ════════════════════════════════════════════════════════
window.openRegModal = function(id) {
  const a = getActivities().find(x=>x.id===id);
  regTargetId = id;
  document.getElementById('rm-name').textContent = a.name;
  document.getElementById('rm-date').textContent = formatDate(a.date);
  document.getElementById('rg-name').value = '';
  document.getElementById('rg-note').value = '';
  document.getElementById('reg-modal').classList.add('open');
};

window.submitReg = async function() {
  const name = document.getElementById('rg-name').value.trim();
  if (!name) { document.getElementById('rg-name').focus(); return; }
  const type = document.getElementById('rg-type').value;
  const note = document.getElementById('rg-note').value.trim();
  setLoading('btn-submit-reg', true);
  let acts = getActivities();
  const a = acts.find(x=>x.id===regTargetId);
  if (a.registrants.find(r=>r.name===name)) {
    alert('此姓名已報名本活動');
    setLoading('btn-submit-reg', false);
    return;
  }
  a.registrants.push({name, type, note});
  await saveActivities(acts);
  closeModal('reg-modal');
  renderFront();
  showToast('✓ 報名成功：'+name);
  setLoading('btn-submit-reg', false);
};

window.openCancelModal = function(id) {
  const a = getActivities().find(x=>x.id===id);
  cancelTargetId = id;
  document.getElementById('cm-name').textContent = a.name;
  document.getElementById('cm-date').textContent = formatDate(a.date);
  document.getElementById('cm-input').value = '';
  document.getElementById('cancel-modal').classList.add('open');
};

window.submitCancel = async function() {
  const name = document.getElementById('cm-input').value.trim();
  if (!name) { document.getElementById('cm-input').focus(); return; }
  let acts = getActivities();
  const a = acts.find(x=>x.id===cancelTargetId);
  if (!a.registrants.find(r=>r.name===name)) {
    const inp = document.getElementById('cm-input');
    inp.style.borderColor='#E24B4A'; inp.placeholder='找不到此姓名，請確認';
    setTimeout(()=>{inp.style.borderColor='';inp.placeholder='姓名'},2000);
    return;
  }
  setLoading('btn-submit-cancel', true);
  a.registrants = a.registrants.filter(r=>r.name!==name);
  await saveActivities(acts);
  closeModal('cancel-modal');
  renderFront();
  showToast('已取消 '+name+' 的報名');
  setLoading('btn-submit-cancel', false);
};

      <div style="margin-top:1rem"><button class="btn-prim" onclick="checkPw()" style="width:100%">登入</button></div>

    </div>
    <div class="add-form"><h2>新增活動</h2>

        <div class="fg"><label>活動名稱</label><input class="fi" id="a-name" placeholder="例：週末長跑"/></div>
        <div class="fg"><label>活動日期</label><input class="fi" type="date" id="a-date"/></div>

        <div class="fg"><label>人數上限</label><input class="fi" type="number" id="a-max" placeholder="留空=無限" min="1"/></div>

        <div class="fg"><label>Google 地圖連結（選填）</label><input class="fi" id="a-mapurl" placeholder="https://maps.app.goo.gl/…"/></div>
      </div>

function renderAdminTable() {
  const area = document.getElementById('admin-table-area');
  if (!area) return;
  const acts = getActivities();
  area.innerHTML = `<div class="tbl-wrap"><table>
    <thead><tr><th>活動名稱</th><th>日期</th><th>類型</th><th>報名</th><th style="min-width:64px">前台顯示</th><th>操作</th></tr></thead>
    <tbody>${acts.length ? acts.map(a=>{
      const tag=TAGS[a.type]||TAGS.other,vis=a.visible!==false;
      return`<tr class="${vis?'':'hidden-row'}">
        <td><span style="font-weight:500">${a.name}</span>${a.desc?`<br><span style="font-size:11px;color:var(--color-text-secondary)">${a.desc}</span>`:''}${a.location?`<br><span style="font-size:11px;color:var(--color-text-secondary)">📍 ${a.location}</span>`:''}${a.mapUrl?`<br><a href="${a.mapUrl}" target="_blank" rel="noopener" style="font-size:11px;color:#185FA5">地圖連結</a>`:''}</td>
        <td style="white-space:nowrap">${formatDate(a.date)}</td>
        <td><span class="atag ${tag.cls}">${tag.label}</span></td>
        <td><span class="bcnt">${a.registrants.length}</span>${a.max?' / '+a.max:''}</td>
        <td>
          <div class="toggle-wrap">
            <label class="toggle"><input type="checkbox" ${vis?'checked':''} onchange="toggleVisible(${a.id},this.checked)"/><span class="slider"></span></label>
            <span class="toggle-label" style="font-size:11px">${vis?'顯示':'隱藏'}</span>
          </div>
        </td>
        <td><div class="action-btns">
          <button class="btn-sm btn-view" onclick="showList(${a.id})">名單</button>
          <button class="btn-sm btn-del" onclick="delActivity(${a.id})">刪除</button>
        </div></td>
      </tr>`;
    }).join('') : '<tr><td colspan="6" class="empty">尚無活動</td></tr>'}</tbody>
  </table></div>`;
}

window.toggleVisible = async function(id, val) {
  let acts = getActivities();
  const a = acts.find(x=>x.id===id);
  a.visible = val;
  await saveActivities(acts);
  showToast(val?'✓ 已在前台顯示':'已從前台隱藏');
  renderAdminTable();
};

window.checkPw = function() {
  const pw = document.getElementById('pw-input').value;
  if (pw === ADMIN_PASSWORD) { adminUnlocked=true; renderAdminContent(); }
  else { document.getElementById('pw-err').textContent='密碼錯誤，請再試一次'; }
};
window.logout = function() { adminUnlocked=false; renderAdmin(); };

window.addActivity = async function() {
  const name = document.getElementById('a-name').value.trim();
  const date = document.getElementById('a-date').value;
  if (!name||!date) { alert('請填寫活動名稱與日期'); return; }
  const type=document.getElementById('a-type').value,
        desc=document.getElementById('a-desc').value.trim(),
        maxVal=document.getElementById('a-max').value,
        visible=document.getElementById('a-visible').checked,
        location=document.getElementById('a-location').value.trim(),
        mapUrl=document.getElementById('a-mapurl').value.trim();
  setLoading('btn-add-act', true);
  let acts = getActivities();
  acts.push({id:nextId(acts),name,date,type,desc,location,mapUrl,max:maxVal?parseInt(maxVal):null,visible,registrants:[]});
  await saveActivities(acts);
  showToast('✓ 活動已新增：'+name);
  renderAdminContent();
  setLoading('btn-add-act', false);
};

window.delActivity = async function(id) {
  if (!confirm('確定要刪除此活動及所有報名資料？')) return;
  let acts = getActivities();
  acts = acts.filter(a=>a.id!==id);
  await saveActivities(acts);
  renderAdminContent();
  showToast('活動已刪除');
};

window.showList = function(id) {
  listTargetId = id;
  const a = getActivities().find(x=>x.id===id);
  document.getElementById('lm-title').textContent = a.name+' 報名名單';
  document.getElementById('lm-sub').textContent = `共 ${a.registrants.length} 人${a.max?' (上限'+a.max+'人)':''}`;
  const ul = document.getElementById('rlist-ul');
  ul.innerHTML = a.registrants.length
    ? a.registrants.map((r,i)=>`<li class="ritem"><span>${i+1}. ${r.name}${r.note?' · '+r.note:''}</span><span style="display:flex;align-items:center;gap:6px"><span class="rtype">${r.type}</span><button class="btn-cancel-reg" onclick="adminCancelReg(${id},'${r.name.replace(/'/g,"\\'")}')">取消報名</button></span></li>`).join('')
    : '<li style="text-align:center;padding:1.5rem;color:var(--color-text-secondary);font-size:13px">尚無人報名</li>';
  document.getElementById('list-modal').classList.add('open');
};

window.adminCancelReg = async function(actId, name) {
  if (!confirm(`確定取消 ${name} 的報名？`)) return;
  let acts = getActivities();
  const a = acts.find(x=>x.id===actId);
  a.registrants = a.registrants.filter(r=>r.name!==name);
  await saveActivities(acts);
  showToast('已取消 '+name+' 的報名');
  showList(actId);
  renderAdminTable();
};

window.exportCSV = function() {
  const a = getActivities().find(x=>x.id===listTargetId);
  const rows = [['序號','姓名','身份','備註'],...a.registrants.map((r,i)=>[i+1,r.name,r.type,r.note||''])];
  const csv = '\uFEFF'+rows.map(r=>r.map(v=>`"${v}"`).join(',')).join('\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'}),url=URL.createObjectURL(blob),lnk=document.createElement('a');
  lnk.href=url; lnk.download=a.name+'_報名名單.csv'; lnk.click(); URL.revokeObjectURL(url);
  showToast('CSV 已下載');
};

window.exportPDF = function() {
  const a = getActivities().find(x=>x.id===listTargetId), tag=TAGS[a.type]||TAGS.other;
  const rows = a.registrants.map((r,i)=>`<tr><td>${i+1}</td><td>${r.name}</td><td>${r.type}</td><td>${r.note||'—'}</td></tr>`).join('');
  const html = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${a.name} 報名名單</title><style>body{font-family:'Noto Sans TC',sans-serif;padding:32px;color:#222}h1{font-size:20px;font-weight:600;margin-bottom:4px}.meta{font-size:13px;color:#666;margin-bottom:24px}table{width:100%;border-collapse:collapse;font-size:13px}th{background:#1a3a2a;color:#fff;padding:8px 12px;text-align:left;font-weight:500}td{padding:8px 12px;border-bottom:1px solid #e0e0e0}tr:nth-child(even) td{background:#f8f8f8}.footer{margin-top:20px;font-size:11px;color:#999}</style></head><body><h1>${a.name}</h1><div class="meta">活動日期：${formatDate(a.date)} ｜ 類型：${tag.label} ｜ 報名人數：${a.registrants.length}${a.max?' / '+a.max:''}人</div><table><thead><tr><th>序號</th><th>姓名</th><th>身份</th><th>備註</th></tr></thead><tbody>${rows||'<tr><td colspan="4" style="text-align:center;color:#999">尚無報名資料</td></tr>'}</tbody></table><div class="footer">列印時間：${new Date().toLocaleString('zh-TW')} ｜ 台中馬拉松社活動報名系統</div><script>window.onload=function(){window.print()}<\/script></body></html>`;
  const w = window.open('','_blank');
  if (w) { w.document.write(html); w.document.close(); }
  else showToast('請允許彈出視窗以匯出 PDF');
};

    <div class="setup-step"><span class="step-num">2</span><div>點擊「新增專案」，輸入名稱（例如：<code>taichung-marathon</code>），依步驟完成建立</div></div>
    <div class="setup-step"><span class="step-num">3</span><div>在左側選單點擊「建構」→「Realtime Database」→「建立資料庫」，地區選擇亞洲，規則選「測試模式」</div></div>
    <div class="setup-step"><span class="step-num">4</span><div>回到「專案設定」（齒輪圖示）→「一般」→ 向下找「您的應用程式」→ 點「&lt;/&gt;」新增網頁應用程式</div></div>
    <div class="setup-step"><span class="step-num">5</span><div>複製出現的 <code>firebaseConfig</code> 物件中的所有值，填入本 HTML 檔案最上方的 <code>FIREBASE_CONFIG</code> 區段</div></div>
    <div class="setup-step"><span class="step-num">6</span><div>儲存 HTML 檔案並重新上傳到 GitHub Pages — 完成！🎉</div></div>
    <p style="margin-top:.75rem;color:#854F0B;font-size:12px">⚠️ 建議在 Firebase Console 的 Realtime Database → 規則 中，設定適當的讀寫規則，避免資料被陌生人刪除。</p>
  </div>`;
  // 插入在 stats-bar 後面
  const statsBar = el.querySelector('.stats-bar');
  if (statsBar) statsBar.insertAdjacentHTML('afterend', setupHtml);
};

// ── Modal 點擊背景關閉 ──
['reg-modal','cancel-modal','list-modal'].forEach(id=>{
  document.getElementById(id).addEventListener('click', e=>{
    if(e.target===document.getElementById(id)) closeModal(id);
  });
});

// ── 啟動 ──
initFirebase();

</script>
</body>
</html>
